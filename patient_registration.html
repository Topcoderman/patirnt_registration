<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport content= device-width, initial-scale= 1.0">
    <title>Patient Registration Form</title>
</head>
<body>
    <hi>Patient Registration form</hi>
    <p>Please fill out all the required fields in the form below to complete registration</p>
    <hr>

    <form action="#" method="POST">
        <label for="full Name"> Full name:</label>
        <input type="text" id="full Name" name="full Name">
        <br><br>

        <label for="email"> Email Address:</label>
        <input type="email" id="email" name="email">
        <br><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone">
        <br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">
        <br><br>

        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other </label>
        <br><br>

        <label> services Required:</label>
        <input type="checkbox" id="consultation" name="services" value="consultation">
        <label for="consultation">Consultation</label>
        <br><br>

        <input type="checkbox" id="labTest" name="services" value="laboratory_test">
        <label for="labTest">Labolatory Test</label>
        <br><br>

            <button type="submit">submit Registration</button>
    </form>
</body>
</html>
